name: Blogspot Saatlik Hız ve Proxy İzleme

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # HER SAAT BAŞI otomatik tetiklenir
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Bağımlılıkları Yükle
      run: npm install

    - name: Playwright Tarayıcılarını Kur
      run: npx playwright install --with-deps chromium

    - name: Botu Çalıştır
      env:
        PROXY_LIST_SECRET: ${{ secrets.PROXY_LIST_SECRET }}
      run: node monitor.js

    - name: Ekran Görüntülerini ve Raporları Kaydet
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          screenshots/
          has_issue.txt
        retention-days: 7
