name: Blog Monitor

on:
  schedule:
    - cron: '0 * * * *'     # Her saat başı (00, 01, 02... dakikası)
  workflow_dispatch:        # Manuel çalıştırmak için buton

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright

      - name: Run Monitoring Script
        run: node monitor.js

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7        # 7 gün sakla (daha uzun istersen 30 yap)
                - name: Send Email Report
        if: always()  # Her zaman çalışsın (hata olsa bile)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Blog Monitoring Raporu - ${{ github.repository }}
          to: umitaltun1677@gmail.com
          from: GitHub Actions <github@noreply.com>
          body: |
            Blog izleme tamamlandı. 
            Detaylı screenshot'lar için GitHub Actions'a bakın.
          attachments: screenshots/*.png
